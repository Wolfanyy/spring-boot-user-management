<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>User Management</title>

    <link rel="stylesheet"
          href="/css/style.css">

    <script defer
            src="/js/app.js"></script>
</head>

<body>

<header class="header">

    <div class="header-content">

        <div class="logo">
            User<span>Management</span>
        </div>

        <a class="btn btn-primary"
           href="/users/create">
            Add User
        </a>

    </div>

</header>

<main class="container">

    <div class="page-header">

        <div>

            <h1 class="page-title">
                Users
            </h1>

            <p class="page-subtitle">
                Total users:
                <span id="users-count">0</span>
            </p>

        </div>

    </div>

    <div class="card">

        <table id="users-table">

            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Age</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody id="users-table-body"></tbody>

        </table>

    </div>

</main>

</body>

</html>
